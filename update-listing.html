<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="styles/css/style.css" />
        <title>Document</title>
    </head>
    <body>
        <header>
            <a href="index.html">Logo</a>
            <nav>
                <ul>
                    <li>Credits:</li>
                    <li><a href="create.html">New listing</a></li>
                    <li><a href="profile.html">Profile</a></li>
                    <li><a href="login.html">Login</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <div><h1>Update listing</h1></div>
            <div>
                <form id="update-listing-form">
                    <div>
                        <label for="listing-title"> Title </label>

                        <input type="text" id="listing-title" required />
                    </div>

                    <div>
                        <label> Image URL </label>

                        <div id="image-input-container">
                            <input type="url" class="image-url-input" />
                        </div>

                        <button type="button" id="add-image-button">+ Add image</button>
                    </div>

                    <div>
                        <label for="listing-tags"> Tags </label>

                        <input type="text" id="listing-tags" placeholder="fashion, vintage, gaming" />
                    </div>

                    <div>
                        <label for="listing-description"> Description </label>

                        <textarea id="listing-description" rows="5"></textarea>
                    </div>

                    <button type="submit">Update listing</button>
                </form>
            </div>
        </main>
        <script type="module" src="/src/main.js"></script>
    </body>
</html>
