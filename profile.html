<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="styles/css/style.css" />
        <title>Document</title>
    </head>
    <body>
        <header>
            <a href="index.html">Logo</a>
            <nav>
                <ul>
                    <li>Credits:</li>
                    <li><a href="create.html">New listing</a></li>
                    <li><a href="profile.html">Profile</a></li>
                    <li><a href="login.html">Login</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <section>
                <img id="profile-avatar" src="/assets/images/profile-placeholder.svg" alt="Profile avatar" />

                <div>
                    <h1 id="profile-name">Username</h1>

                    <p id="profile-email">email</p>

                    <p id="profile-credits">0 credits</p>
                </div>

                <div>
                    <button id="update-profile-btn">Update profile</button>

                    <button id="logout-btn">Logout</button>
                </div>
            </section>

            <section>
                <h2>Your listings</h2>

                <div id="profile-listings-container"></div>
            </section>

            <section>
                <h2>Your bids</h2>

                <div id="profile-bids-container"></div>
            </section>
            <div id="manage-listing-modal" class="d-none">
                <div>
                    <button id="close-manage-listing-modal-btn" type="button">X</button>

                    <h2>Manage listing</h2>

                    <div id="manage-listing-preview"></div>

                    <div>
                        <button id="update-listing-btn" type="button">Update listing</button>

                        <button id="delete-listing-btn" type="button">Delete listing</button>
                    </div>
                </div>
            </div>
        </main>
        <script type="module" src="/src/main.js"></script>
    </body>
</html>
