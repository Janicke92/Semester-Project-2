<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="styles/css/style.css" />
        <title>Document</title>
    </head>
    <body>
        <header>
            <a href="index.html">Logo</a>
            <nav>
                <ul>
                    <li>Credits:</li>
                    <li><a href="create.html">New listing</a></li>
                    <li><a href="profile.html">Profile</a></li>
                    <li><a href="login.html">Login</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <section>
                <div><input type="text" id="search-input" placeholder="Search" /></div>
                <div>
                    <ul class="category-list">
                        <li>
                            <button data-category="fashion">
                                <img src="/assets/icons/fashion.svg" alt="fashion icon" /> <span>Fashion</span>
                            </button>
                        </li>
                        <li>
                            <button data-category="sport">
                                <img src="/assets/icons/sport.svg" alt="sport icon" /> <span>Sport</span>
                            </button>
                        </li>
                        <li>
                            <button data-category="electronics">
                                <img src="/assets/icons/electronics.svg" alt="electronics icon" />
                                <span>Electronics</span>
                            </button>
                        </li>
                        <li>
                            <button data-category="furniture">
                                <img src="/assets/icons/furniture.svg" alt="furniture icon" /> <span>Furniture</span>
                            </button>
                        </li>
                        <li>
                            <button data-category="art">
                                <img src="/assets/icons/art.svg" alt="Art icon" /> <span>Art</span>
                            </button>
                        </li>
                        <li>
                            <button data-category="car">
                                <img src="/assets/icons/car.svg" alt="Cars icon" /> <span>Cars</span>
                            </button>
                        </li>
                        <li>
                            <button data-category="plant">
                                <img src="/assets/icons/plants.svg" alt="Plant icon" /> <span>Plants</span>
                            </button>
                        </li>
                        <li>
                            <button data-category="book">
                                <img src="/assets/icons/books.svg" alt="Books icon" /> <span>Books</span>
                            </button>
                        </li>
                    </ul>
                </div>
            </section>
            <section>
                <div>
                    <div>
                        <fieldset>
                            <legend>Sort by:</legend>

                            <div>
                                <input type="radio" id="newest" name="sort" value="newest" />
                                <label for="newest">Newest</label>
                            </div>

                            <div>
                                <input type="radio" id="ending-soon" name="sort" value="endingSoon" />
                                <label for="ending-soon">Ending Soon</label>
                            </div>

                            <div>
                                <input type="radio" id="most-popular" name="sort" value="mostPopular" />
                                <label for="most-popular">Most popular</label>
                            </div>
                        </fieldset>
                    </div>
                    <div>
                        <fieldset>
                            <legend>Show:</legend>

                            <div>
                                <input type="radio" id="active" name="filter" value="active" />
                                <label for="active">Active listings only</label>
                            </div>

                            <div>
                                <input type="radio" id="inactive" name="filter" value="inactive" />
                                <label for="inactive">Inactive listings only</label>
                            </div>
                        </fieldset>
                    </div>
                </div>
                <div id="listings-container"></div>
                <div>
                    <button id="prev-page-btn" type="button">Previous</button>
                </div>
                <div>
                    <button id="next-page-btn" type="button">Next</button>
                </div>
            </section>
        </main>
        <footer></footer>
        <script type="module" src="/src/main.js"></script>
    </body>
</html>
