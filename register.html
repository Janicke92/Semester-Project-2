<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="styles/css/style.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet" />
        <link rel="icon" type="image/svg+xml" href="/assets/icons/Icon-G.svg" />
        <title>GET Register</title>
    </head>
    <body>
        <header class="d-none d-md-flex">
            <div class="header-container container">
                <div>
                    <a href="index.html"><img src="assets/Logo/logo-get.svg" alt="GET logo" class="header-logo" /></a>
                </div>
                <div>
                    <nav>
                        <ul>
                            <li id="credits-container" class="d-none">
                                Credits:
                                <span class="available-credits"></span>
                                <img src="/assets/icons/icon-credit.svg" alt="Credits icon" class="credits-icon" />
                            </li>
                            <li>
                                <a class="nav-icon-link" href="create.html">
                                    <img src="/assets/icons/icon-new-listing.svg" alt="New listing icon" />
                                    <span>New listing</span>
                                </a>
                            </li>

                            <li>
                                <a class="nav-icon-link" href="profile.html">
                                    <img src="/assets/icons/icon-profile.svg" alt="Profile icon" />
                                    <span>Profile</span>
                                </a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </header>
        <header class="mobile-header d-md-none">
            <div class="container">
                <div class="mt-4 mb-3">
                    <input type="text" id="search-input" placeholder="Search" />
                </div>
            </div>
        </header>
        <main class="container mt-5">
            <section class="container form-container">
                <div><h1>Register</h1></div>
                <form id="register-form" class="all-form">
                    <div>
                        <label for="name" class="form-label">Name</label>
                        <input id="name" type="text" name="name" class="form-input" required />
                    </div>

                    <div>
                        <label for="email" class="form-label">Email</label>
                        <input id="email" type="email" name="email" class="form-input" required />
                    </div>

                    <div>
                        <label for="password" class="form-label">Password</label>
                        <input id="password" type="password" name="password" class="form-input" required />
                    </div>

                    <div>
                        <label for="avatar" class="form-label">Avatar URL</label>
                        <input id="avatar" type="url" name="avatar" class="form-input" required />
                    </div>
                    <p id="register-error" style="color: red"></p>
                    <button type="submit" class="button-primary">Register</button>
                </form>
            </section>
        </main>

        <nav class="bottom-nav d-md-none" aria-label="Mobile navigation">
            <a href="index.html" class="bottom-nav-link">
                <img src="/assets/Logo/logo-get.svg" alt="" class="bottom-nav-logo" />
                <span>Home</span>
            </a>

            <a href="create.html" class="bottom-nav-link active">
                <img src="/assets/icons/icon-new-listing.svg" alt="" class="bottom-nav-icon" />
                <span>New Listing</span>
            </a>

            <a href="profile.html" class="bottom-nav-link">
                <img src="/assets/icons/icon-profile.svg" alt="" class="bottom-nav-icon" />
                <span>Profile</span>
            </a>
        </nav>

        <footer class="d-none d-md-flex">
            <div class="footer-content">
                <div>
                    <a href="index.html" class="footer-link">
                        <img src="/assets/Logo/logo-get.svg" alt="" class="footer-icon" />
                    </a>
                </div>
                <div>
                    <h4>Socials</h4>
                    <ul>
                        <li>
                            <a href="https://x.com/" class="footer-link">
                                <img src="/assets/icons/twitter.svg" alt="" class="footer-icon" />
                                <span>Twitter</span>
                            </a>
                        </li>
                        <li>
                            <a href="https://www.facebook.com/" class="footer-link">
                                <img src="/assets/icons/facbook.svg" alt="" class="footer-icon" />
                                <span>Facebook</span>
                            </a>
                        </li>
                        <li>
                            <a href="https://www.instagram.com/?hl=en/" class="footer-link">
                                <img src="/assets/icons/instagram.svg" alt="" class="footer-icon" />
                                <span>Instagram</span>
                            </a>
                        </li>
                    </ul>
                </div>
                <div>
                    <h4>About</h4>
                    <ul>
                        <li>GET inspired</li>
                        <li>Work at GET</li>
                        <li>Our environment plan</li>
                    </ul>
                </div>
                <div>
                    <h4>Help</h4>
                    <ul>
                        <li>Customer service</li>
                        <li>Terms & conditions</li>
                        <li>Privacy policy</li>
                    </ul>
                </div>
            </div>
        </footer>
        <script type="module" src="/src/main.js"></script>
    </body>
</html>
